<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h2 {
      margin-top: 0;
      color: #0b3b6e;
      text-align: center;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.95;
    }

    .error {
      margin-top: 12px;
      color: #c8102e;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
    <div class="login-box">
    <h2>Panel Administrativo Recinto de Gurabo</h2>
    <p>Inicia sesión para acceder a las citas</p>

    <input type="email" id="email" placeholder="Correo electrónico" />
    <input type="password" id="password" placeholder="Contraseña" />
    <button type="button" onclick="login(event)">Entrar</button>

    <div class="error" id="errorMsg"></div>
  </div>

 <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAHEyhKMPyoYyGAK4evC6T8KknS06u23f8",
  authDomain: "sistema-cita-manpowergroup.firebaseapp.com",
  databaseURL: "https://sistema-cita-manpowergroup-default-rtdb.firebaseio.com",
  projectId: "sistema-cita-manpowergroup",
  storageBucket: "sistema-cita-manpowergroup.firebasestorage.app",
  messagingSenderId: "284482299414",
  appId: "1:284482299414:web:d4f894073d4bed6bb7737",
  measurementId: "G-TT6MB6Z0Q1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const ADMIN_EMAILS = ["cita.gurabo@gmail.com"];

function login(event) {
    if (event) event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.textContent = "";

    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            const user = userCredential.user;

            if (!ADMIN_EMAILS.includes(user.email)) {
                return auth.signOut().then(() => {
                    throw new Error("No autorizado para acceder al panel.");
                });
            }

            window.location.replace("admin-citas.html");
        })
        .catch(error => {
            errorMsg.textContent = "Error: " + error.message;
        });
}
</script>
</body>
</html>
